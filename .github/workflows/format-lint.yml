name: Format, Lint
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  format:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: true
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - run: cargo fmt

      - uses: EndBug/add-and-commit@290ea2c423ad77ca9c62ae0f5b224379612c0321 # v10.0.0
        if: github.event_name != 'pull_request'
        with:
          default_author: github_actions
          message: Formatting
      - run: git status
        if: github.event_name == 'pull_request'

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write
      actions: write
    needs: format

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
      - uses: cargo-bins/cargo-binstall@c0ae9335b22cb4f297cdd1df049cd87bf2aa223f # main
      - run: cargo binstall --force clippy-sarif@${{ env.CLIPPY_SARIF_VERSION }}
        env:
          # renovate: datasource=crate depName=clippy-sarif versioning=loose
          CLIPPY_SARIF_VERSION: 0.8.0

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3

      - run: |
          mkdir sarif-cargo
          cargo clippy --locked --fix --broken-code --allow-dirty \
                       --all-targets --all-features --message-format=json |
          clippy-sarif | tee ${{ runner.temp }}/rust.sarif
        if: '!cancelled()'

      - uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: '!cancelled()'
        with:
          sarif_file: ${{ runner.temp }}/rust.sarif
          category: rust

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: github.ref_name == 'dev' && !cancelled()
        with:
          branch: lint
          title: Linting
      - run: git status
        if: github.ref_name != 'dev' && !cancelled()
